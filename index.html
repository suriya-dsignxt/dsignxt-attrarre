<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attrarre Leather | Premium Luxury Leather Goods</title>
    <meta name="description" content="Explore Attrarre Leather's premium collection of hand-crafted, luxury leather goods. Timeless craftsmanship, modern elegance.">
    
    <!-- Google Fonts for Premium Luxury Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables for Luxury Brand Palette */
        :root {
            --color-bg: #0a0908;
            --color-surface: #12100e;
            --color-gold: #c5a880;
            --color-gold-hover: #e0c59e;
            --color-text-light: #f4f1eb;
            --color-text-muted: #a39e93;
        }

        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            background-color: var(--color-bg);
            /* Custom Scrollbar for Firefox */
            scrollbar-color: var(--color-gold) var(--color-bg);
            scrollbar-width: thin;
        }

        body {
            font-family: 'Cinzel', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text-light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Screen Reader Only Utility for Accessibility (SEO H1) */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Custom Scrollbar Styling for WebKit browsers (Chrome, Safari, Edge) */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--color-bg);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--color-gold);
            border: 2px solid var(--color-bg);
            border-radius: 4px;
            transition: background 0.3s ease;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-gold-hover);
        }

        /* Elegant Loader Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--color-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .loader-logo {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 0.35em;
            color: var(--color-gold);
            text-transform: uppercase;
            margin-bottom: 24px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .loader-spinner {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(197, 168, 128, 0.1);
            border-top: 2px solid var(--color-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Main Content Container */
        #content {
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .landing-page-container {
            width: 100%;
            max-width: 100%;
            display: block;
            position: relative;
        }

        .landing-page-image {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            /* Optimizes image display quality */
            image-rendering: -webkit-optimize-contrast;
        }

        /* Animations */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Accessible Heading for SEO -->
    <h1 class="sr-only">Attrarre Leather - Premium Luxury Landing Page</h1>

    <!-- Elegant Preloader -->
    <div id="loader" role="alert" aria-busy="true" aria-label="Loading Attrarre Leather Landing Page">
        <div class="loader-logo">Attrarre</div>
        <div class="loader-spinner"></div>
    </div>

    <!-- Main Content Area -->
    <main id="content" aria-hidden="true">
        <div class="landing-page-container">
            <img 
                id="landing-img"
                src="Attrarre Leather landing Page.jpg" 
                alt="Attrarre Leather Landing Page Mockup" 
                class="landing-page-image"
                loading="eager"
            />
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loader');
            const content = document.getElementById('content');
            const img = document.getElementById('landing-img');

            const fadeOutLoader = () => {
                loader.style.opacity = '0';
                content.style.opacity = '1';
                content.removeAttribute('aria-hidden');
                loader.setAttribute('aria-busy', 'false');
                
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 800);
            };

            // If the image is already cached/loaded
            if (img.complete) {
                setTimeout(fadeOutLoader, 600);
            } else {
                img.addEventListener('load', fadeOutLoader);
                // Fallback loader fade out in case of networking issues
                setTimeout(fadeOutLoader, 4000);
            }
        });
    </script>
</body>
</html>
